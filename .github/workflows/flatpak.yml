name: Flatpak

# Builds a .flatpak bundle and a Linux tar.gz on every tag push.
#
# Required secrets / variables for Flathub publishing:
#   vars.FLATHUB_MANIFEST_REPO  — e.g. "zeuros/io.github.zeuros.gitgud"
#   secrets.FLATHUB_REPO_TOKEN  — fine-grained PAT with Contents+PR write access

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build Flatpak for (e.g. v2.4.0)'
        required: true

permissions:
  contents: write

env:
  APP_ID: io.github.zeuros.gitgud
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE26: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version:     ${{ steps.meta.outputs.version }}
      sha256_x64:  ${{ steps.tar.outputs.sha256_x64 }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Extract version
        id: meta
        run: |
          TAG=${{ github.ref_name || inputs.tag }}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build frontend
        run: npm run build:angular

      - name: Build Tauri binary
        run: cargo build --release
        working-directory: src-tauri

      - name: Create tar.gz (binary + icons for Flathub manifest)
        id: tar
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          mkdir -p release staging/bin staging/icons
          cp src-tauri/target/release/gitgud staging/bin/gitgud
          cp src-tauri/icons/32x32.png    staging/icons/32x32.png
          cp src-tauri/icons/64x64.png    staging/icons/64x64.png
          cp src-tauri/icons/128x128.png  staging/icons/128x128.png
          tar -czf "release/GitGud-${VERSION}-Linux-x64.tar.gz" -C staging .
          SHA=$(sha256sum "release/GitGud-${VERSION}-Linux-x64.tar.gz" | cut -d' ' -f1)
          echo "sha256_x64=${SHA}" >> $GITHUB_OUTPUT

      # ── Flatpak bundle via flatpak-builder ─────────────────────────────────
      - name: Cache Flatpak SDK
        uses: actions/cache@v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-sdk-gnome-47-x64

      - name: Install Flatpak build tools
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive -y \
            org.gnome.Platform//47 \
            org.gnome.Sdk//47

      - name: Write CI manifest (uses local staging dir, no remote download)
        run: |
          cat > /tmp/ci-manifest.yml << 'MANIFEST'
          app-id: io.github.zeuros.gitgud
          runtime: org.gnome.Platform
          runtime-version: "47"
          sdk: org.gnome.Sdk
          command: gitgud
          separate-locales: false
          finish-args:
            - --share=ipc
            - --socket=x11
            - --socket=wayland
            - --share=network
            - --device=dri
            - --filesystem=home
            - --socket=ssh-auth
            - --talk-name=org.freedesktop.Notifications
            - --talk-name=org.freedesktop.portal.OpenURI
            - --talk-name=org.freedesktop.portal.FileChooser
          modules:
            - name: gitgud
              buildsystem: simple
              build-commands:
                - install -Dm755 bin/gitgud /app/bin/gitgud
                - install -Dm644 io.github.zeuros.gitgud.desktop
                    /app/share/applications/io.github.zeuros.gitgud.desktop
                - install -Dm644 io.github.zeuros.gitgud.metainfo.xml
                    /app/share/metainfo/io.github.zeuros.gitgud.metainfo.xml
                - install -Dm644 icons/32x32.png
                    /app/share/icons/hicolor/32x32/apps/io.github.zeuros.gitgud.png
                - install -Dm644 icons/64x64.png
                    /app/share/icons/hicolor/64x64/apps/io.github.zeuros.gitgud.png
                - install -Dm644 icons/128x128.png
                    /app/share/icons/hicolor/128x128/apps/io.github.zeuros.gitgud.png
              sources:
                - type: dir
                  path: STAGING_DIR
                - type: file
                  path: DESKTOP_FILE
                - type: file
                  path: METAINFO_FILE
          MANIFEST

          sed -i \
            -e "s|STAGING_DIR|$GITHUB_WORKSPACE/staging|" \
            -e "s|DESKTOP_FILE|$GITHUB_WORKSPACE/build/flatpak/io.github.zeuros.gitgud.desktop|" \
            -e "s|METAINFO_FILE|$GITHUB_WORKSPACE/build/flatpak/io.github.zeuros.gitgud.metainfo.xml|" \
            /tmp/ci-manifest.yml

      - name: Build Flatpak
        run: |
          flatpak-builder --user \
            --install-deps-from=flathub \
            --force-clean \
            --repo=/tmp/flatpak-repo \
            /tmp/flatpak-build \
            /tmp/ci-manifest.yml

      - name: Bundle Flatpak
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          flatpak build-bundle /tmp/flatpak-repo \
            "release/GitGud-${VERSION}-Linux-x64.flatpak" \
            io.github.zeuros.gitgud

      # ── Upload to GitHub release ───────────────────────────────────────────
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          gh release upload "${{ github.ref_name }}" \
            "release/GitGud-${VERSION}-Linux-x64.tar.gz" \
            "release/GitGud-${VERSION}-Linux-x64.flatpak" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: flatpak-bundle
          path: |
            release/GitGud-*-Linux-x64.tar.gz
            release/GitGud-*-Linux-x64.flatpak
          retention-days: 7

  build-arm64:
    runs-on: ubuntu-24.04-arm

    outputs:
      sha256_arm64: ${{ steps.tar.outputs.sha256_arm64 }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Extract version
        id: meta
        run: |
          TAG=${{ github.ref_name || inputs.tag }}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build frontend
        run: npm run build:angular

      - name: Build Tauri binary (arm64)
        run: cargo build --release
        working-directory: src-tauri

      - name: Create tar.gz (arm64)
        id: tar
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          mkdir -p release staging/bin staging/icons
          cp src-tauri/target/release/gitgud staging/bin/gitgud
          cp src-tauri/icons/32x32.png    staging/icons/32x32.png
          cp src-tauri/icons/64x64.png    staging/icons/64x64.png
          cp src-tauri/icons/128x128.png  staging/icons/128x128.png
          tar -czf "release/GitGud-${VERSION}-Linux-arm64.tar.gz" -C staging .
          SHA=$(sha256sum "release/GitGud-${VERSION}-Linux-arm64.tar.gz" | cut -d' ' -f1)
          echo "sha256_arm64=${SHA}" >> $GITHUB_OUTPUT

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          gh release upload "${{ github.ref_name }}" \
            "release/GitGud-${VERSION}-Linux-arm64.tar.gz" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Push updated manifest to the fork (open PR to Flathub by hand) ──────────
  update-flathub:
    runs-on: ubuntu-latest
    needs: [build, build-arm64]
    if: |
      startsWith(github.ref, 'refs/tags/') &&
      vars.FLATHUB_MANIFEST_REPO != '' &&
      needs.build.outputs.sha256_x64 != ''

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Checkout Flathub manifest repo
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.FLATHUB_MANIFEST_REPO }}
          token: ${{ secrets.FLATHUB_REPO_TOKEN }}
          path: flathub-manifest

      - name: Update manifest checksums
        run: |
          python3 scripts/update-flatpak-manifest.py \
            --version "${{ needs.build.outputs.version }}" \
            --sha256-x64 "${{ needs.build.outputs.sha256_x64 }}" \
            --sha256-arm64 "${{ needs.build-arm64.outputs.sha256_arm64 }}" \
            --manifest "flathub-manifest/${{ env.APP_ID }}.yml"

      - name: Commit and push to manifest repo
        run: |
          git -C flathub-manifest config user.name  "github-actions[bot]"
          git -C flathub-manifest config user.email "github-actions[bot]@users.noreply.github.com"
          git -C flathub-manifest add "${{ env.APP_ID }}.yml"
          git -C flathub-manifest commit -m "Update to v${{ needs.build.outputs.version }}"
          git -C flathub-manifest push
