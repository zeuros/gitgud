name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE26: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            args: '--bundles deb,rpm,appimage'
          - os: ubuntu-24.04-arm
            args: '--bundles deb,rpm,appimage'
          - os: windows-2025
            args: '--bundles nsis'
          - os: windows-11-arm
            args: '--bundles nsis'
          - os: macos-latest
            rust-target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin --bundles dmg'
          - os: macos-latest
            rust-target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin --bundles dmg'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xdg-utils

      - run: npm ci --legacy-peer-deps

      - run: npm run build:angular

      - name: Build Tauri
        run: npx tauri build ${{ matrix.args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/**/bundle/**/*.deb
            src-tauri/target/**/bundle/**/*.rpm
            src-tauri/target/**/bundle/**/*.AppImage
            src-tauri/target/**/bundle/**/*.exe
            src-tauri/target/**/bundle/**/*.dmg
