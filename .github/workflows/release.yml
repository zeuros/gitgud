name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: windows-2025
            platform: win
            arch: x64
          - os: windows-11-arm
            platform: win
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y rpm flatpak flatpak-builder

      - name: Cache Flatpak SDK
        if: matrix.platform == 'linux'
        uses: actions/cache@v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-sdk-24.08-${{ matrix.arch }}

      - name: Install Flatpak SDK
        if: matrix.platform == 'linux'
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user --noninteractive -y \
            org.electronjs.Electron2.BaseApp//24.08 \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08

      - name: Install dependencies
        run: npm ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build:prod

      - name: Package
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:prod && npx electron-builder --linux --dir

      - name: Install system dependencies
        run: |
          sudo apt-get install -y xvfb libgbm-dev libasound2t64
          npx playwright install-deps

      - name: Run e2e tests
        run: npm run e2e
