<p-dialog
  header="Settings"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [style]="{width: '400px'}"
>
  <div class="settings-row">
    <label>Auto-fetch interval (seconds)</label>
    <p-input-number
      [(ngModel)]="settings.autoFetchInterval"
      [min]="10"
      [max]="3600"
      [showButtons]="true"
    />
  </div>
</p-dialog>
