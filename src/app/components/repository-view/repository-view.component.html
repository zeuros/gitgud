@if (currentRepo.cwd(); as repoId) {
    <p-splitter stateStorage="local" [stateKey]="'splitter-main-view-' + repoId" [minSizes]="[8, 13, 10]" class="h-full">
        <ng-template pTemplate>
            <gitgud-left-panel/>
        </ng-template>
        <ng-template pTemplate>
            <gitgud-logs/>
        </ng-template>
        <ng-template pTemplate>
            <gitgud-commit-section #commitPanel/>
        </ng-template>
    </p-splitter>

    @let file = fileDiffPanel.fileToDiff$ | async;
    <gitgud-monaco-editor-view
            [fileToDiff]="file"
            class="editor-overlay"
            [style.right.px]="editorRightPx()"
            [style.display]="file ? '' : 'none'"/>
    @if (fileDiffPanel.conflictedFile()) {
        <gitgud-merge-editor class="editor-overlay" [style.right.px]="editorRightPx()"/>
    }
}
