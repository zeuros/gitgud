<div class="container h-full w-full">

    <div class="panel">
        <div class="title">
            <i class="fa fa-laptop mr-2"></i>Local
        </div>
        <div class="content">
            <p-tree
                    class="p-0"
                    selectionMode="single"
                    [value]="localBranches()"
                    [selection]="selectedBranchNode()"
                    (onNodeSelect)="selectBranchCommit($branchNode($event.node).data)"
                    [contextMenu]="branchesContextMenu"
            />
        </div>
    </div>

    <div class="panel">
        <div class="title">
            <i class="fa fa-cloud mr-2"></i>Remote
        </div>
        <div class="content">
            <p-tree
                    class="p-0"
                    selectionMode="single"
                    [value]="localBranches()"
                    [selection]="selectedBranchNode()"
                    (onNodeSelect)="selectBranchCommit($branchNode($event.node).data)"
                    [contextMenu]="branchesContextMenu"
            />
        </div>
    </div>

    <div class="panel">
        <div class="title">
            <i class="fa fa-archive mr-2"></i>Stashes
        </div>
        <div class="content">

            @for (stash of gitRepositoryStore.stashes(); track stash.sha) {
                @let s = $stash(stash);
                <div class="p-2 cursor-pointer hover:surface-hover flex align-items-center gap-2" tabindex (click)="selectStash(stash)"
                 [class.p-highlight]="gitRepositoryStore.selectedStash()?.sha === stash.sha">
                    <img src="assets/images/chest.svg" width="16" height="16" alt="stash" class="black-and-white"/>
                    <span class="ellipsis text-gray">{{ s.summary }}</span>
                </div>
            }
        </div>
    </div>
</div>

<p-contextMenu #branchesContextMenu [model]="contextMenu" appendTo="body"/>
