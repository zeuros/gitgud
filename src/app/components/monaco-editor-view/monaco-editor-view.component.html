<p-select-button [options]="viewOptions" [ngModel]="viewType()" (ngModelChange)="setViewType($event)" optionValue="value" class="display-modes">
  <ng-template #item let-opt>
    <i [class]="opt.icon"></i> {{ opt.label }}
  </ng-template>
</p-select-button>

<div #diffEditor class="diff-editor-container"></div>
