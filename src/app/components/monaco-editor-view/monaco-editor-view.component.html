@if (conflictFilePath() && conflictFileContent()) {
  <gitgud-conflict-resolver
    [filePath]="conflictFilePath()!"
    [fileContent]="conflictFileContent()!"
    (resolved)="onConflictResolved()"
  />
} @else {
  <p-toolbar>
    <ng-template #start/>
    <ng-template #center/>
    <ng-template #end>
      <p-button-group>
        <p-button label="Hunk View" (onClick)="setViewType('hunk')" tooltipPosition="top" pTooltip="Hunk View"><i class="fa fa-pencil"></i></p-button>
        <p-button label="Inline View" (onClick)="setViewType('inline')" tooltipPosition="top" pTooltip="Inline View"/>
        <p-button label="Split View" (onClick)="setViewType('split')" tooltipPosition="top" pTooltip="Split View"/>
      </p-button-group>
    </ng-template>
  </p-toolbar>

  <div #diffEditor class="diff-editor-container"></div>
}
