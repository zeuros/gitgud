@let selectedIndex = gitRepositoryStore.selectedIndex();

<gitgud-toolbar/>

<p-tabs [value]="selectedIndex" (valueChange)="gitRepositoryStore.selectRepository($event!)" scrollable>

    <p-tablist>
        @for (repository of gitRepositoryStore.repositories(); track repository.id; let i = $index) {
            <p-tab
                    [value]="i"
                    draggable="true"
                    (dragstart)="onDragStart($event, i)"
                    (dragover)="onDragOver($event, i)"
                    (drop)="onDrop($event)"
                    (dragend)="onDragEnd()"
                    (auxclick)="onMiddleClick($event, i)"
            >
                <i class="fa fa-code-fork"></i>
                {{ repository.name }}
                <p-button
                        icon="pi pi-times"
                        [rounded]="true"
                        [text]="true"
                        [severity]="i == selectedIndex ? 'primary' : 'secondary'"
                        styleClass="close-tab-btn"
                        (click)="gitRepositoryStore.removeRepository(i); $event.stopPropagation()"
                />
            </p-tab>
        }

        <p-button
                icon="pi pi-plus"
                [text]="true"
                class="flex"
                severity="primary"
                (click)="gitRepositoryService.pickFolderAndOpenRepository()"
        />
    </p-tablist>

    <p-tabpanels class="fill-height">
        <p-tabpanel>
            <gitgud-repository-view/>
        </p-tabpanel>
    </p-tabpanels>

</p-tabs>
