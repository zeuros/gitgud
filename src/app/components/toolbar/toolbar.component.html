<div class="repo-info">
    <div class="repo-name-clip">
        <div class="repo-info-track">
            <span class="repo-name"><span class="sword">⚔</span> {{ currentRepo.name() }} <span class="sword">⚔</span></span>
        </div>
    </div>
    <span class="branch-badge">{{ currentRepo.headBranch()?.name ?? short(currentRepo.detachedHeadSha() ?? '') + ' (detached HEAD)' }}</span>
</div>

<p-divider layout="vertical"/>

<div class="actions">
    @if (isRebasing()) {
        <span class="rebase-label">Rebase in progress</span>
        <p-button class="sober rebase-continue"
                  [text]="true"
                  [loading]="loading() === 'rebase-continue'"
                  [disabled]="!!loading() || !!currentRepo.workDirStatus()?.conflicted?.length"
                  (onClick)="continueRebase()"
        >
            <i class="fa fa-play"></i>
            <span>Continue</span>
        </p-button>
        <p-button class="sober rebase-abort"
                  [text]="true"
                  [loading]="loading() === 'rebase-abort'"
                  [disabled]="!!loading()"
                  (onClick)="abortRebase()"
        >
            <i class="fa fa-times"></i>
            <span>Abort</span>
        </p-button>
        <p-divider layout="vertical"/>
    }
    <p-button class="sober"
              [text]="true"
              [loading]="loading() === 'push'"
              [disabled]="!!loading()"
              (onClick)="push()"
    >
        <i class="fa fa-arrow-up"></i>
        <span>Push</span>
    </p-button>

    <p-button class="sober"
              [text]="true"
              [loading]="loading() === 'pull'"
              [disabled]="!!loading()"
              (onClick)="pull()"
    >
        <i class="fa fa-arrow-down"></i>
        <span>Pull</span>
    </p-button>

    <p-divider layout="vertical"/>

    <p-button class="sober"
              [text]="true"
              [loading]="loading() === 'stash'"
              [disabled]="!!loading() || !hasWorkDirChanges()"
              (onClick)="stash()"
    >
        <i class="fa fa-archive"></i>
        <span>Stash</span>
    </p-button>

    <p-button class="sober"
              [text]="true"
              [loading]="loading() === 'pop'"
              [disabled]="!!loading() || !hasStashes()"
              (onClick)="pop()"
    >
        <i class="fa fa-inbox"></i>
        <span>Pop</span>
    </p-button>

    <p-divider layout="vertical"/>

    <p-button class="sober"
              [text]="true"
              (onClick)="createBranch.createBranchAtSha(currentRepo.headSha()!)"
    >
        <i class="fa fa-code-fork"></i>
        <span>Branch</span>
    </p-button>

    <p-button class="sober"
              [text]="true"
              [loading]="loading() === 'fetch'"
              [disabled]="!!loading()"
              (onClick)="fetch()"
    >
        <i class="fa fa-refresh"></i>
        <span>Fetch</span>
        @if (fetchedAgo(); as ago) {
            <span class="fetched-ago">{{ ago }}</span>
        }
    </p-button>

    <p-button class="sober" icon="fa fa-download" [text]="true" [rounded]="true" pTooltip="Clone" tooltipPosition="bottom" (onClick)="openCloneDialog()"/>
    <p-button class="sober" icon="fa fa-history" [text]="true" [rounded]="true" [pTooltip]="undo.undoTooltip()" tooltipPosition="bottom" (onClick)="undo.undo()"/>
    <p-button class="sober" icon="fa fa-repeat" [text]="true" [rounded]="true" [pTooltip]="undo.redoTooltip()" tooltipPosition="bottom" [disabled]="!undo.redoAvailable()"
              (onClick)="undo.redo()"/>
    <p-button class="sober" icon="fa fa-terminal" [text]="true" [rounded]="true" pTooltip="Git command history" tooltipPosition="bottom" (onClick)="openShellHistoryDialog()"/>
    <p-button class="sober" icon="fa fa-cog" [text]="true" [rounded]="true" pTooltip="Settings" tooltipPosition="bottom" (onClick)="openSettingsDialog()"/>
</div>

<p-select
        [options]="zoomLevels"
        [(ngModel)]="settings.zoom"
        optionLabel="label"
        optionValue="value"
        style="margin-left: auto"
>
    <ng-template pTemplate="selectedItem" let-item>
        Zoom ({{ item.label }})
    </ng-template>
</p-select>

<gitgud-settings-dialog/>
<gitgud-clone-dialog/>
<gitgud-shell-history-dialog/>
